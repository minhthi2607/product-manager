<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Auction Product Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <style>
        body {
            background-color: #f4f6fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        .navbar-custom {
            background-color: #1e3a8a;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            background: white;
            margin-bottom: 25px;
        }
        .card-header-custom {
            background-color: #2563eb;
            color: white;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
            padding: 15px 20px;
        }
        .table-custom th {
            background-color: #2563eb !important;
            color: white !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table-custom tbody tr:hover {
            background-color: #f8fafc;
        }
        .badge-waiting {
            background-color: #e0f2fe;
            color: #0369a1;
        }
        .badge-active {
            background-color: #dcfce7;
            color: #15803d;
        }
        .badge-sold {
            background-color: #f1f5f9;
            color: #475569;
        }
        .btn-search {
            background-color: #2563eb;
            color: white;
        }
        .btn-search:hover {
            background-color: #1d4ed8;
            color: white;
        }
        .page-link-custom {
            color: #2563eb;
            border-radius: 6px;
            margin: 0 3px;
        }
        .page-item.active .page-link-custom {
            background-color: #2563eb;
            border-color: #2563eb;
            color: white;
        }
    </style>
</head>
<body>
    <div th:fragment="header">
        <nav class="navbar navbar-dark navbar-custom py-3 mb-4">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="/">
                    <i class="bi bi-gavel fs-3 me-2"></i>
                    <span class="fs-4 fw-bold">Hệ thống Đấu giá Sản phẩm</span>
                </a>
            </div>
        </nav>
    </div>

    <div th:fragment="footer" class="container text-center py-4 mt-5 text-muted border-top">

    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
